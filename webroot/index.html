<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KPM OC Manager</title>
  <meta name="description" content="Dynamic CPU/GPU Overclock Manager for Headwolf F8 via KPM">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <!-- ═══ Header ═══ -->
  <header class="header">
    <div class="header-icon">⚡</div>
    <h1>OC Manager</h1>
    <p class="subtitle">Headwolf F8 · Dimensity 8300 · v8.0</p>
    <div id="module-status" class="status-badge offline">
      <span class="status-dot"></span> Checking...
    </div>
  </header>

  <!-- ═══ Tab Navigation ═══ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="cpu" id="tab-btn-cpu">
      <span class="tab-icon">⚡</span> CPU
    </button>
    <button class="tab-btn" data-tab="gpu" id="tab-btn-gpu">
      <span class="tab-icon">🎮</span> GPU
    </button>
    <button class="tab-btn" data-tab="ram" id="tab-btn-ram">
      <span class="tab-icon">🧠</span> RAM
    </button>
    <button class="tab-btn" data-tab="storage" id="tab-btn-storage">
      <span class="tab-icon">💾</span> Storage
    </button>
    <button class="tab-btn" data-tab="profile" id="tab-btn-profile">
      <span class="tab-icon">🎯</span> Profile
    </button>
  </nav>

  <!-- ═══ CPU Tab ═══ -->
  <section class="tab-content active" data-tab="cpu">

    <!-- CPU Cluster Tables (dynamically populated) -->
    <div id="cpu-clusters">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- CPU Thermal Mitigation Card -->
    <div id="cpu-thermal-card"></div>

    <!-- CPU Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-cpu-scan" style="flex:1">
        🔄 Reload
      </button>
      <button class="btn btn-primary btn-full" onclick="window.OC.applyAll()" id="btn-cpu-apply" style="flex:2">
        🚀 Apply Changes
      </button>
    </div>

  </section>

  <!-- ═══ GPU Tab ═══ -->
  <section class="tab-content" data-tab="gpu">

    <!-- GPU OPP Table (dynamically populated) -->
    <div id="gpu-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- GPU Thermal Mitigation Card -->
    <div id="gpu-thermal-card"></div>

    <!-- GPU Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-gpu-scan" style="flex:1">
        🔄 Reload
      </button>
      <button class="btn btn-primary gpu-accent btn-full" onclick="window.OC.applyAll()" id="btn-gpu-apply" style="flex:2">
        🚀 Apply Changes
      </button>
    </div>

  </section>

  <!-- ═══ RAM Tab ═══ -->
  <section class="tab-content" data-tab="ram">

    <!-- RAM Info & OPP Table (dynamically populated) -->
    <div id="ram-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- RAM Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-ram-scan" style="flex:1">
        🔄 Reload
      </button>
      <button class="btn btn-primary ram-accent btn-full" onclick="window.OC.applyAll()" id="btn-ram-apply" style="flex:2">
        🚀 Apply Changes
      </button>
    </div>

  </section>

  <!-- ═══ Storage Tab ═══ -->
  <section class="tab-content" data-tab="storage">

    <!-- Storage Devices (dynamically populated) -->
    <div id="storage-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:160px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- Storage Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-storage-scan" style="flex:1">
        🔄 Reload
      </button>
      <button class="btn btn-primary storage-accent btn-full" onclick="window.OC.applyAll()" id="btn-storage-apply" style="flex:2">
        🚀 Apply Changes
      </button>
    </div>

  </section>

  <!-- ═══ Profile Tab ═══ -->
  <section class="tab-content" data-tab="profile">
    <div id="profile-content"></div>
    <div id="gaming-app-selector"></div>
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" style="flex:1">
        🔄 Reload
      </button>
      <button class="btn btn-primary btn-full" onclick="window.OC.applyAll()" style="flex:2">
        🚀 Apply Changes
      </button>
    </div>
  </section>

</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Application Logic -->
<script src="app.js"></script>

</body>
</html>
