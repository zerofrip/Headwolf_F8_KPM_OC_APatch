<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KPM OC Manager</title>
  <meta name="description" content="Dynamic CPU/GPU Overclock Manager for Headwolf F8 via KPM">
  <link rel="stylesheet" href="style.css?v=2">
  <script src="i18n.js"></script>
</head>
<body>

<div class="app-container">

  <!-- ═══ Header ═══ -->
  <header class="header">
    <div class="header-icon">⚡</div>
    <h1 data-i18n="header.title">OC Manager</h1>
    <p class="subtitle" data-i18n="header.subtitle">Headwolf F8 · Dimensity 8300</p>
    <div id="module-status" class="status-badge offline">
      <span class="status-dot"></span> <span data-i18n="header.checking">Checking...</span>
    </div>
    <div class="lang-switcher" id="lang-switcher"></div>
  </header>

  <!-- ═══ Tab Navigation ═══ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="cpu" id="tab-btn-cpu">
      <span class="tab-icon">⚡</span> <span data-i18n="tab.cpu">CPU</span>
    </button>
    <button class="tab-btn" data-tab="gpu" id="tab-btn-gpu">
      <span class="tab-icon">🎮</span> <span data-i18n="tab.gpu">GPU</span>
    </button>
    <button class="tab-btn" data-tab="ram" id="tab-btn-ram">
      <span class="tab-icon">🧠</span> <span data-i18n="tab.ram">RAM</span>
    </button>
    <button class="tab-btn" data-tab="storage" id="tab-btn-storage">
      <span class="tab-icon">💾</span> <span data-i18n="tab.storage">Storage</span>
    </button>
    <button class="tab-btn" data-tab="display" id="tab-btn-display">
      <span class="tab-icon">🖥️</span> <span data-i18n="tab.display">Display</span>
    </button>
    <button class="tab-btn" data-tab="profile" id="tab-btn-profile">
      <span class="tab-icon">🎯</span> <span data-i18n="tab.profile">Profile</span>
    </button>
  </nav>

  <!-- ═══ CPU Tab ═══ -->
  <section class="tab-content active" data-tab="cpu">

    <!-- CPU Cluster Tables (dynamically populated) -->
    <div id="cpu-clusters">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- CPU Thermal Mitigation Card -->
    <div id="cpu-thermal-card"></div>

    <!-- CPU Tuning Card (governor, cpuidle, scheduler, FPSGO) -->
    <div id="cpu-tuning-card"></div>

    <!-- CPU Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-cpu-scan" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary btn-full" onclick="window.OC.applyCpu()" id="btn-cpu-apply" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>

  </section>

  <!-- ═══ GPU Tab ═══ -->
  <section class="tab-content" data-tab="gpu">

    <!-- GPU OPP Table (dynamically populated) -->
    <div id="gpu-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- GPU Thermal Mitigation Card -->
    <div id="gpu-thermal-card"></div>

    <!-- GPU Tuning Card (Mali kbase + Vulkan) -->
    <div id="gpu-tuning-card"></div>

    <!-- GPU Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-gpu-scan" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary gpu-accent btn-full" onclick="window.OC.applyGpu()" id="btn-gpu-apply" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>

  </section>

  <!-- ═══ RAM Tab ═══ -->
  <section class="tab-content" data-tab="ram">

    <!-- RAM Info & OPP Table (dynamically populated) -->
    <div id="ram-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:200px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- RAM Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-ram-scan" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary ram-accent btn-full" onclick="window.OC.applyRam()" id="btn-ram-apply" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>

  </section>

  <!-- ═══ Storage Tab ═══ -->
  <section class="tab-content" data-tab="storage">

    <!-- Storage Devices (dynamically populated) -->
    <div id="storage-devices">
      <div class="card">
        <div class="card-header">
          <div class="skeleton" style="width:120px;height:18px"></div>
          <div class="skeleton" style="width:60px;height:18px"></div>
        </div>
        <div class="skeleton" style="height:160px;margin-bottom:8px"></div>
      </div>
    </div>

    <!-- Storage Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" id="btn-storage-scan" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary storage-accent btn-full" onclick="window.OC.applyStorage()" id="btn-storage-apply" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>

  </section>

  <!-- ═══ Display Tab ═══ -->
  <section class="tab-content" data-tab="display">

    <!-- Display Tuning Card (refresh rate, animation, PQ, idle) -->
    <div id="display-tuning-card"></div>

    <!-- Display Action Buttons -->
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary btn-full" onclick="window.OC.applyDisplay()" id="btn-display-apply" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>

  </section>

  <!-- ═══ Profile Tab ═══ -->
  <section class="tab-content" data-tab="profile">
    <div id="profile-content"></div>
    <div id="gaming-app-selector"></div>
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="window.OC.scanAndLoad()" style="flex:1">
        🔄 <span data-i18n="btn.reload">Reload</span>
      </button>
      <button class="btn btn-primary btn-full" onclick="window.OC.applyProfile()" style="flex:2">
        🚀 <span data-i18n="btn.apply">Apply Changes</span>
      </button>
    </div>
  </section>

</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Application Logic -->
<script src="app.js"></script>

</body>
</html>
